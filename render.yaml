# Blueprint do Render: cria banco Postgres + backend (Web Service) + frontend (Static Site)
# Doc: https://render.com/docs/blueprint-spec
#
# Atenção: o Postgres do plano "free" do Render expira após 30 dias.
#
# Se mudar o nome do serviço "g2-backend", ajuste também o VITE_API_URL
# do "g2-frontend" para apontar para a nova URL.

databases:
  - name: g2-db
    databaseName: banco1
    user: g2_user
    plan: free

services:
  - type: web
    name: g2-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: g2-db
          property: connectionString
      - key: DB_SCHEMA
        value: integrador
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: JWT_SECRET
        generateValue: true
      - key: PARTNER_API_KEY
        generateValue: true

  - type: web
    name: g2-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://g2-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
